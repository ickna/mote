<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Mote</title>
<style>
/* ── Reset ──────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#06060e;--fg:#c8c8d0;--accent:#e03030;--panel:rgba(12,12,24,.92);--border:rgba(200,200,208,.12)}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--fg);font-family:'Inter',system-ui,-apple-system,sans-serif;font-size:13px}
canvas{display:block;width:100%;height:100%}

/* ── Loading ────────────────────────────────────── */
#loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:100;background:var(--bg);transition:opacity .6s ease;pointer-events:none}
#loading.hidden{opacity:0}
#loading .dot{width:6px;height:6px;margin:0 4px;border-radius:50%;background:var(--accent);animation:loadPulse 1.2s ease-in-out infinite}
#loading .dot:nth-child(2){animation-delay:.2s}
#loading .dot:nth-child(3){animation-delay:.4s}
@keyframes loadPulse{0%,100%{opacity:.2;transform:scale(1)}50%{opacity:1;transform:scale(1.5)}}

/* ── Player overlay ─────────────────────────────── */
#player-overlay{position:fixed;inset:0;z-index:5;pointer-events:none;display:none}
#player-overlay .info{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);font-size:11px;opacity:.15;letter-spacing:1px;text-transform:uppercase;white-space:nowrap}
.mode-play #player-overlay{display:block}

/* ── Editor Panel ───────────────────────────────── */
#editor-panel{position:fixed;top:0;left:0;bottom:0;width:300px;z-index:50;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:transform .3s ease}
.mode-play #editor-panel{display:none}
#editor-panel.collapsed{transform:translateX(-280px)}
#editor-panel.collapsed .panel-toggle{right:-32px;left:auto;border-radius:0 4px 4px 0;border:1px solid var(--border);border-left:0}

.panel-header{padding:16px 16px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.panel-header h1{font-size:15px;font-weight:600;letter-spacing:.5px}
.panel-header h1 span{color:var(--accent)}
.panel-header .btn{background:none;border:1px solid var(--border);color:var(--fg);padding:4px 10px;border-radius:4px;cursor:pointer;font-size:11px;transition:all .2s}
.panel-header .btn:hover{border-color:var(--accent);color:#fff}

.panel-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.panel-tab{padding:10px 16px;cursor:pointer;font-size:11px;text-transform:uppercase;letter-spacing:.5px;opacity:.4;border-bottom:2px solid transparent;transition:all .2s;user-select:none}
.panel-tab:hover{opacity:.7}
.panel-tab.active{opacity:1;border-bottom-color:var(--accent)}

.panel-body{flex:1;overflow-y:auto;padding:12px 16px}
.panel-body::-webkit-scrollbar{width:4px}
.panel-body::-webkit-scrollbar-track{background:transparent}
.panel-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

.panel-section{margin-bottom:16px}
.panel-section h3{font-size:10px;text-transform:uppercase;letter-spacing:1px;opacity:.35;margin-bottom:8px}

.param-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.param-row label{flex:0 0 80px;font-size:11px;opacity:.6}
.param-row input[type="range"]{flex:1;height:3px;-webkit-appearance:none;appearance:none;background:var(--border);border-radius:2px;outline:none;cursor:pointer}
.param-row input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--accent);border:2px solid var(--bg);cursor:pointer}
.param-row .param-val{flex:0 0 36px;text-align:right;font-size:11px;font-variant-numeric:tabular-nums;opacity:.7}
.param-row input[type="color"]{width:32px;height:24px;border:1px solid var(--border);border-radius:3px;padding:0;cursor:pointer;background:none}

.btn-row{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.btn-sm{background:transparent;border:1px solid var(--border);color:var(--fg);padding:6px 14px;border-radius:4px;cursor:pointer;font-size:11px;transition:all .2s;font-family:inherit}
.btn-sm:hover{border-color:var(--accent);color:#fff}
.btn-sm.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-sm.primary:hover{opacity:.85}

/* ── File drop zone ─────────────────────────────── */
.drop-zone{border:2px dashed var(--border);border-radius:6px;padding:24px 16px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:12px}
.drop-zone:hover,.drop-zone.dragover{border-color:var(--accent);background:rgba(224,48,48,.05)}
.drop-zone svg{width:24px;height:24px;opacity:.3;margin-bottom:6px}
.drop-zone p{font-size:11px;opacity:.4}
.drop-zone .filename{font-size:12px;opacity:.7;margin-top:4px;display:none}

/* ── Preset list ────────────────────────────────── */
.preset-list{display:flex;flex-direction:column;gap:4px}
.preset-item{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border:1px solid var(--border);border-radius:4px;cursor:pointer;transition:all .2s}
.preset-item:hover{border-color:rgba(200,200,208,.3)}
.preset-item.active{border-color:var(--accent);background:rgba(224,48,48,.08)}
.preset-item .name{font-size:11px;font-weight:500}
.preset-item .actions{display:flex;gap:4px}
.preset-item .actions button{background:none;border:none;color:var(--fg);opacity:.3;cursor:pointer;font-size:13px;padding:2px 4px;transition:opacity .2s}
.preset-item .actions button:hover{opacity:1}

/* ── Panel toggle ───────────────────────────────── */
.panel-toggle{position:absolute;top:50%;right:-32px;transform:translateY(-50%);width:32px;height:40px;background:var(--panel);border:1px solid var(--border);border-left:0;border-radius:0 4px 4px 0;cursor:pointer;color:var(--fg);font-size:14px;display:flex;align-items:center;justify-content:center;opacity:.5;transition:opacity .2s}
#editor-panel.collapsed .panel-toggle{left:auto;right:-32px;border-radius:0 4px 4px 0;border:1px solid var(--border);border-left:0}
.panel-toggle:hover{opacity:1}

/* ── Color row override ─────────────────────────── */
.color-row .param-val{flex:0 0 auto;font-size:10px;font-family:monospace;opacity:.5}

/* ── Responsive ─────────────────────────────────── */
@media(max-width:720px){#editor-panel{width:260px}}
</style>
</head>
<body>

<!-- ── Canvas ─────────────────────────────────── -->
<canvas id="c"></canvas>

<!-- ── Loading ─────────────────────────────────── -->
<div id="loading"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>

<!-- ── Player overlay ──────────────────────────── -->
<div id="player-overlay">
  <div class="info">Mote <span style="color:var(--accent)">◆</span> <span id="player-preset-name"></span></div>
</div>

<!-- ── Editor Panel ────────────────────────────── -->
<div id="editor-panel">
  <div class="panel-header">
    <h1><span>M</span>ote</h1>
    <div>
      <button class="btn" id="btn-export-html" title="Export as playback HTML">Export HTML</button>
      <button class="btn" id="btn-toggle-collapse" title="Collapse panel">◀</button>
    </div>
  </div>

  <div class="panel-tabs">
    <div class="panel-tab active" data-tab="params">Parameters</div>
    <div class="panel-tab" data-tab="svg">SVG</div>
    <div class="panel-tab" data-tab="presets">Presets</div>
  </div>

  <div class="panel-body" id="panel-body">
    <!-- ── PARAMETERS TAB ── -->
    <div class="panel-tab-content" data-tab="params">
      <div class="panel-section">
        <h3>3D Rotation</h3>
        <div class="param-row"><label>Yaw Speed</label><input type="range" id="p-yawSpeed" min="0" max="2" step="0.01"><span class="param-val" id="v-yawSpeed"></span></div>
        <div class="param-row"><label>Pitch Speed</label><input type="range" id="p-pitchSpeed" min="0" max="1" step="0.01"><span class="param-val" id="v-pitchSpeed"></span></div>
        <div class="param-row"><label>Yaw Amp</label><input type="range" id="p-yawAmp" min="0" max="1" step="0.01"><span class="param-val" id="v-yawAmp"></span></div>
        <div class="param-row"><label>Pitch Amp</label><input type="range" id="p-pitchAmp" min="0" max="0.5" step="0.01"><span class="param-val" id="v-pitchAmp"></span></div>
      </div>

      <div class="panel-section">
        <h3>Particle Motion</h3>
        <div class="param-row"><label>Spacing</label><input type="range" id="p-spacing" min="4" max="60" step="1"><span class="param-val" id="v-spacing"></span></div>
        <div class="param-row"><label>Spring</label><input type="range" id="p-spring" min="0.01" max="0.2" step="0.005"><span class="param-val" id="v-spring"></span></div>
        <div class="param-row"><label>Damping</label><input type="range" id="p-damping" min="0.5" max="0.98" step="0.01"><span class="param-val" id="v-damping"></span></div>
        <div class="param-row"><label>Wave Amp</label><input type="range" id="p-waveAmp" min="0" max="40" step="1"><span class="param-val" id="v-waveAmp"></span></div>
        <div class="param-row"><label>Wave Freq</label><input type="range" id="p-waveFreq" min="0" max="0.01" step="0.0001"><span class="param-val" id="v-waveFreq"></span></div>
        <div class="param-row"><label>Z Dispersion</label><input type="range" id="p-zDispersion" min="0" max="200" step="1"><span class="param-val" id="v-zDispersion"></span></div>
      </div>

      <div class="panel-section">
        <h3>Appearance</h3>
        <div class="param-row"><label>Size Min</label><input type="range" id="p-sizeMin" min="0.5" max="8" step="0.5"><span class="param-val" id="v-sizeMin"></span></div>
        <div class="param-row"><label>Size Max</label><input type="range" id="p-sizeMax" min="1" max="16" step="0.5"><span class="param-val" id="v-sizeMax"></span></div>
        <div class="param-row"><label>Glow Blur</label><input type="range" id="p-glowBlur" min="0" max="20" step="1"><span class="param-val" id="v-glowBlur"></span></div>
        <div class="param-row"><label>Depth Fade</label><input type="range" id="p-depthFade" min="0" max="1" step="0.05"><span class="param-val" id="v-depthFade"></span></div>
        <div class="param-row"><label>Color</label><input type="color" id="p-color"><span class="param-val" id="v-color"></span></div>
                <div class="param-row color-secondary-row" style="display:none"><label>Color 2</label><input type="color" id="p-colorSecondary"><span class="param-val" id="v-colorSecondary"></span></div>
                <div class="param-row"><label>Color Mode</label>
                  <select id="p-colorMode" style="flex:1;background:var(--bg);color:var(--fg);border:1px solid var(--border);border-radius:3px;padding:3px 6px;font-size:11px;font-family:inherit">
                    <option value="solid">Solid</option>
                    <option value="gradient-z">Z Gradient</option>
                    <option value="gradient-position">Position</option>
                    <option value="gradient-random">Random</option>
                  </select>
                </div>
                <div class="param-row"><label>Palette</label>
                  <select id="p-palette" style="flex:1;background:var(--bg);color:var(--fg);border:1px solid var(--border);border-radius:3px;padding:3px 6px;font-size:11px;font-family:inherit">
                    <option value="custom">Custom</option>
                    <option value="fire">Fire</option>
                    <option value="ocean">Ocean</option>
                    <option value="aurora">Aurora</option>
                    <option value="sunset">Sunset</option>
                    <option value="neon">Neon</option>
                    <option value="monochrome">Monochrome</option>
                  </select>
                </div>
                <div class="param-row"><label>Scale</label><input type="range" id="p-scale" min="0.1" max="1.5" step="0.05"><span class="param-val" id="v-scale"></span></div>
                <div class="param-row"><label>Render Mode</label>
                  <select id="p-renderMode" style="flex:1;background:var(--bg);color:var(--fg);border:1px solid var(--border);border-radius:3px;padding:3px 6px;font-size:11px;font-family:inherit">
                    <option value="dots">Dots</option>
                    <option value="lines">Connected Lines</option>
                    <option value="triangles">Triangles</option>
                    <option value="glow">Glow Field</option>
                  </select>
                </div>
                <div class="param-row line-threshold-row" style="display:none"><label>Line Threshold</label><input type="range" id="p-lineThreshold" min="20" max="200" step="2"><span class="param-val" id="v-lineThreshold"></span></div>
                <div class="param-row"><label>Trails</label>
                  <label style="flex:1;display:flex;align-items:center;gap:6px;cursor:pointer">
                    <input type="checkbox" id="p-trails" style="accent-color:var(--accent)">
                    <span style="font-size:11px;opacity:.5" id="v-trails">Off</span>
                  </label>
                </div>
                <div class="param-row"><label>Edge Shimmer</label>
                  <label style="flex:1;display:flex;align-items:center;gap:6px;cursor:pointer">
                    <input type="checkbox" id="p-edgeShimmer" style="accent-color:var(--accent)">
                    <span style="font-size:11px;opacity:.5" id="v-edgeShimmer">Off</span>
                  </label>
                </div>
                <div class="param-row"><label>Starfield</label>
                  <label style="flex:1;display:flex;align-items:center;gap:6px;cursor:pointer">
                    <input type="checkbox" id="p-starfield" style="accent-color:var(--accent)">
                    <span style="font-size:11px;opacity:.5" id="v-starfield">Off</span>
                  </label>
                </div>
                <div class="param-row"><label>Transition</label><input type="range" id="p-transitionDuration" min="0" max="3000" step="100"><span class="param-val" id="v-transitionDuration"></span></div>
              </div>

              <div class="btn-row">
                <button class="btn-sm primary" id="btn-reset-particles">Reset Particles</button>
                <button class="btn-sm" id="btn-reset-defaults">Reset Defaults</button>
              </div>
            </div>

    <!-- ── SVG TAB ── -->
    <div class="panel-tab-content" data-tab="svg" style="display:none">
      <div class="panel-section">
        <h3>Import SVG</h3>
        <div class="drop-zone" id="drop-zone">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 4v16M4 12h16"/></svg>
          <p>Drop SVG file or click to browse</p>
          <div class="filename" id="svg-filename"></div>
        </div>
        <input type="file" id="svg-file-input" accept=".svg" style="display:none">
      </div>
      <div class="panel-section">
        <h3>Current Shape</h3>
        <div id="svg-info">No SVG loaded</div>
      </div>
      <div class="btn-row">
        <button class="btn-sm" id="btn-load-ickna">Reset to ickna logo</button>
      </div>
    </div>

    <!-- ── PRESETS TAB ── -->
    <div class="panel-tab-content" data-tab="presets" style="display:none">
      <div class="panel-section">
        <h3>Saved Presets</h3>
        <div class="preset-list" id="preset-list"></div>
      </div>
      <div class="btn-row">
        <button class="btn-sm primary" id="btn-save-preset">Save Current as Preset</button>
        <button class="btn-sm" id="btn-export-preset">Export Preset JSON</button>
        <button class="btn-sm" id="btn-import-preset">Import Preset JSON</button>
      </div>
      <input type="file" id="preset-file-input" accept=".json" style="display:none">
    </div>
  </div>

  <button class="panel-toggle" id="panel-toggle" title="Collapse">◀</button>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// Mote — SVG-to-particle engine
// ═══════════════════════════════════════════════════════════════

// ── Embedded ickna logo SVG ───────────────────────────────────
const ICKNA_SVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 4000 3000">
  <g transform="matrix(20.207,0,0,20.207,292.003,-186.173)">
    <path d="M136.86,63.78 C126,63.78 117.2,72.59 117.19,83.45 L117.19,96.45 C117.19,107.31 108.39,116.11 97.53,116.11 L84.53,116.11 C73.67,116.1 64.86,124.9 64.85,135.76 C64.84,146.62 73.64,155.43 84.5,155.44 L136.85,155.44 C147.71,155.44 156.51,146.63 156.52,135.77 L156.52,83.44 C156.52,72.58 147.72,63.78 136.86,63.78 Z"/>
    <path d="M84.53,11.44 L32.19,11.44 C21.33,11.44 12.53,20.25 12.52,31.11 L12.52,83.44 C12.52,94.3 21.32,103.11 32.19,103.11 C43.06,103.11 51.86,94.31 51.86,83.44 L51.86,70.44 C51.86,59.58 60.66,50.78 71.52,50.78 L84.52,50.78 C95.38,50.78 104.19,41.98 104.19,31.11 C104.19,20.24 95.39,11.44 84.53,11.44 Z"/>
    <circle cx="84.53" cy="83.44" r="19.67"/>
    <circle cx="32.19" cy="135.78" r="19.67"/>
    <circle cx="136.86" cy="31.11" r="19.67"/>
  </g>
</svg>`;

// ── Default Parameters ────────────────────────────────────────
const DEFAULT_PARAMS = {
  yawSpeed: 0.5,
  pitchSpeed: 0.3,
  yawAmp: 0.15,
  pitchAmp: 0.08,
  spacing: 20,
  spring: 0.05,
  damping: 0.88,
  waveAmp: 12,
  waveFreq: 0.002,
  zDispersion: 60,
  sizeMin: 1.5,
  sizeMax: 7.5,
  glowBlur: 3,
  depthFade: 0.6,
  color: '#e03030',
  colorSecondary: '#7b2ff7',
  colorMode: 'solid',
  scale: 0.80,
  renderMode: 'dots',
  trails: false,
  edgeShimmer: false,
  starfield: false,
  transitionDuration: 800,
  lineThreshold: 60
};

// ═══════════════════════════════════════════════════════════════
// Color Helpers
// ═══════════════════════════════════════════════════════════════

const PALETTES = {
  custom: { name: 'Custom', colors: ['#e03030', '#7b2ff7'] },
  fire: { name: 'Fire', colors: ['#e03030', '#ff6b35', '#f7c59f'] },
  ocean: { name: 'Ocean', colors: ['#00d4ff', '#0077b6', '#023e8a'] },
  aurora: { name: 'Aurora', colors: ['#00ff87', '#60efff', '#7b2ff7'] },
  sunset: { name: 'Sunset', colors: ['#ff6b35', '#e03030', '#7b2ff7'] },
  neon: { name: 'Neon', colors: ['#ff00ff', '#00ffff', '#ffff00'] },
  monochrome: { name: 'Monochrome', colors: ['#e03030', '#901818', '#400808'] }
};

function hexToRgb(hex) {
  return { r: parseInt(hex.slice(1, 3), 16), g: parseInt(hex.slice(3, 5), 16), b: parseInt(hex.slice(5, 7), 16) };
}

function lerpRgb(rgb1, rgb2, t) {
  const t2 = Math.max(0, Math.min(1, t));
  return `rgb(${Math.round(rgb1.r + (rgb2.r - rgb1.r) * t2)},${Math.round(rgb1.g + (rgb2.g - rgb1.g) * t2)},${Math.round(rgb1.b + (rgb2.b - rgb1.b) * t2)})`;
}

function getParticleColor(pt, p, rgb1, rgb2) {
  if (p.colorMode === 'solid' || !rgb2) return p.color;
  let t;
  switch (p.colorMode) {
    case 'gradient-z': t = (pt.z + 100) / 400; break;
    case 'gradient-position': t = ((pt.px + pt.py) / 800 + 0.5) % 1; break;
    case 'gradient-random': t = (pt.phase / (Math.PI * 2)); break;
    default: return p.color;
  }
  return lerpRgb(rgb1, rgb2, t);
}

// ── State ─────────────────────────────────────────────────────
let params = { ...DEFAULT_PARAMS };
let particles = [];
let presetName = 'ickna';
let currentSVG = ICKNA_SVG;
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, DPR;
let logoCanvas = null;
let animId = null;
let engineReady = false;
let waveNodes = []; // extracted from SVG circles
let yawAngle = 0, pitchAngle = 0;
let yRotEnabled = true;
const keys = {};
let edgeParticles = []; // edge particles for shimmer effect
let transition = null; // { startTime, duration, oldParticles, oldEdgeParticles }
let stars = [];
let dragState = { active: false, startX: 0, startY: 0, moved: false };
const DRAG_SENSITIVITY = 0.008;

// ── URL mode ──────────────────────────────────────────────────
const urlParams = new URLSearchParams(window.location.search);
const isPlayMode = urlParams.get('mode') === 'play';
const presetParam = urlParams.get('preset') || '';

// ── Canvas resize ─────────────────────────────────────────────
function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * DPR;
  canvas.height = H * DPR;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener('resize', resize);
resize();

// ═══════════════════════════════════════════════════════════════
// SVG Parser
// ═══════════════════════════════════════════════════════════════

const MoteSVG = {
  renderToCanvas(svgString, sampleSize) {
    const parser = new DOMParser();
    const doc = parser.parseFromString(svgString, 'image/svg+xml');
    const svg = doc.querySelector('svg');
    if (!svg) return null;

    // Get viewBox
    let vb = svg.getAttribute('viewBox');
    let svgW, svgH;
    if (vb) {
      const parts = vb.split(/[\s,]+/).map(Number);
      svgW = parts[2] - parts[0];
      svgH = parts[3] - parts[1];
    } else {
      svgW = parseInt(svg.getAttribute('width')) || 400;
      svgH = parseInt(svg.getAttribute('height')) || 300;
    }

    const aspect = svgW / svgH;
    const c = document.createElement('canvas');
    c.width = sampleSize;
    c.height = Math.round(sampleSize / aspect);
    const tctx = c.getContext('2d');

    // Render SVG to canvas
    const img = new Image();
    const blob = new Blob([svgString], { type: 'image/svg+xml' });
    const url = URL.createObjectURL(blob);

    return new Promise((resolve) => {
      img.onload = () => {
        tctx.drawImage(img, 0, 0, c.width, c.height);
        URL.revokeObjectURL(url);
        resolve({ canvas: c, width: c.width, height: c.height });
      };
      img.onerror = () => {
        // Fallback: try rendering paths directly
        URL.revokeObjectURL(url);
        resolve(this.renderPathsDirect(svgString, sampleSize, svgW, svgH));
      };
      img.src = url;
    });
  },

  renderPathsDirect(svgString, sampleSize, svgW, svgH) {
    // Fallback rendering — handles all SVG element types via Path2D/Canvas2D
    const parser = new DOMParser();
    const doc = parser.parseFromString(svgString, 'image/svg+xml');
    const aspect = svgW / svgH;
    const cw = sampleSize;
    const ch = Math.round(sampleSize / aspect);
    const c = document.createElement('canvas');
    c.width = cw;
    c.height = ch;
    const tctx = c.getContext('2d');
    const s = cw / svgW;

    tctx.fillStyle = '#fff';
    tctx.strokeStyle = '#fff';
    tctx.lineWidth = 2;

    // Collect all drawable elements in document order (preserves z-order)
    const elements = doc.querySelectorAll('path, circle, rect, ellipse, polygon, polyline, line');

    for (const el of elements) {
      tctx.save();
      // Scale to SVG coordinate space first, then apply parent transforms
      tctx.scale(s, s);
      let parent = el.parentElement;
      while (parent && parent.tagName === 'g') {
        const t = parent.getAttribute('transform');
        if (t) this.applyTransform(tctx, t);
        parent = parent.parentElement;
      }
      this.drawElement(tctx, el);
      tctx.restore();
    }

    return { canvas: c, width: cw, height: ch };
  },

  drawElement(ctx, el) {
    const tag = el.tagName.toLowerCase();
    const fill = el.getAttribute('fill');
    const stroke = el.getAttribute('stroke');
    const strokeWidth = parseFloat(el.getAttribute('stroke-width')) || 1;
    const useStroke = fill === 'none' || fill === 'transparent' || tag === 'line';
    const useFill = !useStroke && stroke !== 'none';

    if (useStroke) {
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = Math.max(strokeWidth, 1);
    }

    switch (tag) {
      case 'path': {
        const d = el.getAttribute('d');
        if (!d) break;
        const p = new Path2D(d);
        if (useFill) ctx.fill(p);
        if (useStroke) ctx.stroke(p);
        break;
      }
      case 'circle': {
        const cx = parseFloat(el.getAttribute('cx')) || 0;
        const cy = parseFloat(el.getAttribute('cy')) || 0;
        const r = parseFloat(el.getAttribute('r')) || 0;
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        if (useFill) ctx.fill();
        if (useStroke) ctx.stroke();
        break;
      }
      case 'rect': {
        const x = parseFloat(el.getAttribute('x')) || 0;
        const y = parseFloat(el.getAttribute('y')) || 0;
        const w = parseFloat(el.getAttribute('width'));
        const h = parseFloat(el.getAttribute('height'));
        if (!w || !h) break;
        const rx = parseFloat(el.getAttribute('rx')) || 0;
        const ry = parseFloat(el.getAttribute('ry')) || rx;
        ctx.beginPath();
        if (rx || ry) {
          ctx.roundRect(x, y, w, h, Math.min(rx, w / 2), Math.min(ry, h / 2));
        } else {
          ctx.rect(x, y, w, h);
        }
        if (useFill) ctx.fill();
        if (useStroke) ctx.stroke();
        break;
      }
      case 'ellipse': {
        const cx = parseFloat(el.getAttribute('cx')) || 0;
        const cy = parseFloat(el.getAttribute('cy')) || 0;
        const rx = parseFloat(el.getAttribute('rx')) || 0;
        const ry = parseFloat(el.getAttribute('ry')) || 0;
        if (!rx || !ry) break;
        ctx.beginPath();
        ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
        if (useFill) ctx.fill();
        if (useStroke) ctx.stroke();
        break;
      }
      case 'polygon':
      case 'polyline': {
        const pts = el.getAttribute('points');
        if (!pts) break;
        const coords = pts.trim().split(/[,\s]+/).map(Number);
        ctx.beginPath();
        for (let i = 0; i < coords.length - 1; i += 2) {
          if (i === 0) ctx.moveTo(coords[i], coords[i + 1]);
          else ctx.lineTo(coords[i], coords[i + 1]);
        }
        if (tag === 'polygon') ctx.closePath();
        if (useFill) ctx.fill();
        if (useStroke) ctx.stroke();
        break;
      }
      case 'line': {
        const x1 = parseFloat(el.getAttribute('x1')) || 0;
        const y1 = parseFloat(el.getAttribute('y1')) || 0;
        const x2 = parseFloat(el.getAttribute('x2')) || 0;
        const y2 = parseFloat(el.getAttribute('y2')) || 0;
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.stroke();
        break;
      }
    }
  },

  applyTransform(ctx, transformStr) {
    // Parse combined transforms: "translate(10,20) scale(2) rotate(45)"
    const re = /(\w+)\s*\(([^)]*)\)/g;
    let match;
    while ((match = re.exec(transformStr)) !== null) {
      const fn = match[1];
      const args = match[2].split(/[,\s]+/).map(Number).filter(n => !isNaN(n));
      switch (fn) {
        case 'matrix':
          if (args.length >= 6) ctx.transform(args[0], args[1], args[2], args[3], args[4], args[5]);
          break;
        case 'translate':
          ctx.translate(args[0] || 0, args[1] || 0);
          break;
        case 'rotate': {
          const angle = (args[0] || 0) * Math.PI / 180;
          if (args.length >= 3) {
            ctx.translate(args[1], args[2]);
            ctx.rotate(angle);
            ctx.translate(-args[1], -args[2]);
          } else {
            ctx.rotate(angle);
          }
          break;
        }
        case 'scale':
          ctx.scale(args[0] || 1, args[1] || args[0] || 1);
          break;
        case 'skewX':
          ctx.transform(1, 0, Math.tan((args[0] || 0) * Math.PI / 180), 1, 0, 0);
          break;
        case 'skewY':
          ctx.transform(1, Math.tan((args[0] || 0) * Math.PI / 180), 0, 1, 0, 0);
          break;
      }
    }
  },

  sample(canvasData, spacing, opts = {}) {
    const { canvas: src } = canvasData;
    const tw = src.width;
    const th = src.height;
    const tctx = src.getContext('2d');
    const cols = Math.ceil(tw / spacing);
    const rows = Math.ceil(th / spacing);
    const zDisp = opts.zDispersion || 60;
    const sizeMin = opts.sizeMin || 1.5;
    const sizeMax = opts.sizeMax || 7.5;
    const scatter = 300;
    const zSpread = 100;
    const list = [];

    for (let gy = 0; gy < rows; gy++) {
      for (let gx = 0; gx < cols; gx++) {
        const px = gx * spacing + spacing / 2;
        const py = gy * spacing + spacing / 2;
        const pixel = tctx.getImageData(Math.round(px), Math.round(py), 1, 1).data;
        if (pixel[3] > 30) {
          const nx = (px / tw) * 2 - 1;
          const ny = (py / th) * 2 - 1;
          const tz = zDisp * Math.sin(nx * Math.PI * 0.8) * Math.cos(ny * Math.PI * 0.6)
                   + (zDisp / 2) * Math.sin(px * 0.03) * Math.cos(py * 0.04);
          list.push({
            tx: px, ty: py, tz: tz,
            x: px + (Math.random() - 0.5) * scatter,
            y: py + (Math.random() - 0.5) * scatter,
            z: tz + (Math.random() - 0.5) * zSpread,
            vx: 0, vy: 0, vz: 0,
            size: sizeMin + Math.random() * (sizeMax - sizeMin),
            phase: Math.random() * Math.PI * 2
          });
        }
      }
    }
    return list;
  },

  countShapes(svgString) {
    const parser = new DOMParser();
    const doc = parser.parseFromString(svgString, 'image/svg+xml');
    return {
      paths: doc.querySelectorAll('path').length,
      circles: doc.querySelectorAll('circle').length,
      total: doc.querySelectorAll('path, circle, rect, ellipse, polygon, polyline').length
    };
  },

  getInfo(svgString) {
    const info = this.countShapes(svgString);
    const parser = new DOMParser();
    const doc = parser.parseFromString(svgString, 'image/svg+xml');
    const svg = doc.querySelector('svg');
    const vb = svg ? svg.getAttribute('viewBox') : 'none';
    return `${info.paths} paths, ${info.circles} circles · viewBox: ${vb}`;
  }
};

// ═══════════════════════════════════════════════════════════════
// Engine
// ═══════════════════════════════════════════════════════════════

const FOCAL = 900;

function rotateX(y, z, angle) {
  const c = Math.cos(angle), s = Math.sin(angle);
  return { y: y * c - z * s, z: y * s + z * c };
}

function rotateY(x, z, angle) {
  const c = Math.cos(angle), s = Math.sin(angle);
  return { x: x * c - z * s, z: x * s + z * c };
}

// ═══════════════════════════════════════════════════════════════
// Render Modes
// ═══════════════════════════════════════════════════════════════

const RENDER_MODES = {
  dots: {
    name: 'Dots',
    draw(ctx, projected, p) {
      const rgb1 = hexToRgb(p.color);
      const rgb2 = p.colorSecondary && p.colorMode !== 'solid' ? hexToRgb(p.colorSecondary) : null;
      for (const pt of projected) {
        const c = getParticleColor(pt, p, rgb1, rgb2);
        ctx.fillStyle = c;
        ctx.shadowColor = c;
        ctx.shadowBlur = p.glowBlur;
        ctx.globalAlpha = Math.max(0.15, Math.min(1, pt.alpha));
        ctx.beginPath();
        ctx.arc(pt.px, pt.py, pt.r, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  },

  lines: {
    name: 'Connected Lines',
    draw(ctx, projected, p) {
      const threshold = p.lineThreshold || 60;
      const rgb1 = hexToRgb(p.color);
      const rgb2 = p.colorSecondary && p.colorMode !== 'solid' ? hexToRgb(p.colorSecondary) : null;
      const cellSize = threshold;
      const grid = new Map();
      for (let i = 0; i < projected.length; i++) {
        const pt = projected[i];
        const cx = Math.floor(pt.px / cellSize);
        const cy = Math.floor(pt.py / cellSize);
        const key = cx + ',' + cy;
        if (!grid.has(key)) grid.set(key, []);
        grid.get(key).push(i);
      }

      // Draw dots first
      ctx.shadowBlur = p.glowBlur;
      for (const pt of projected) {
        const c = getParticleColor(pt, p, rgb1, rgb2);
        ctx.fillStyle = c;
        ctx.shadowColor = c;
        ctx.globalAlpha = Math.max(0.15, Math.min(1, pt.alpha));
        ctx.beginPath();
        ctx.arc(pt.px, pt.py, pt.r * 0.6, 0, Math.PI * 2);
        ctx.fill();
      }

      // Draw connections
      ctx.shadowBlur = 0;
      ctx.lineWidth = 0.5;
      let drawn = 0;
      const maxLines = 200;
      const seen = new Set();

      for (let i = 0; i < projected.length && drawn < maxLines; i++) {
        const a = projected[i];
        const cx = Math.floor(a.px / cellSize);
        const cy = Math.floor(a.py / cellSize);
        for (let dx = -1; dx <= 1 && drawn < maxLines; dx++) {
          for (let dy = -1; dy <= 1 && drawn < maxLines; dy++) {
            const key = (cx + dx) + ',' + (cy + dy);
            const neighbors = grid.get(key);
            if (!neighbors) continue;
            for (const j of neighbors) {
              if (j <= i) continue;
              const edgeKey = i < j ? i + '-' + j : j + '-' + i;
              if (seen.has(edgeKey)) continue;
              seen.add(edgeKey);
              const b = projected[j];
              const dx2 = a.px - b.px, dy2 = a.py - b.py;
              const dist = Math.sqrt(dx2 * dx2 + dy2 * dy2);
              if (dist <= threshold) {
                const lineAlpha = Math.min(a.alpha, b.alpha) * 0.4;
                const midPt = { px: (a.px + b.px) / 2, py: (a.py + b.py) / 2, z: (a.z + b.z) / 2, phase: (a.phase + b.phase) / 2 };
                ctx.strokeStyle = getParticleColor(midPt, p, rgb1, rgb2);
                ctx.globalAlpha = lineAlpha;
                ctx.beginPath();
                ctx.moveTo(a.px, a.py);
                ctx.lineTo(b.px, b.py);
                ctx.stroke();
                drawn++;
              }
            }
          }
        }
      }
    }
  },

  triangles: {
    name: 'Triangles',
    _lastFrame: 0,
    _edgeCache: null,
    _cacheKey: '',
    draw(ctx, projected, p, t) {
      const frameNum = Math.floor(t / 500); // recompute every ~500ms
      const cacheKey = frameNum + ':' + projected.length + ':' + (p.lineThreshold || 60);
      const rgb1 = hexToRgb(p.color);
      const rgb2 = p.colorSecondary && p.colorMode !== 'solid' ? hexToRgb(p.colorSecondary) : null;

      let edges;
      if (this._cacheKey === cacheKey && this._edgeCache) {
        edges = this._edgeCache;
      } else {
        edges = this._triangulate(projected, p.lineThreshold || 80);
        this._edgeCache = edges;
        this._cacheKey = cacheKey;
      }

      // Draw dots
      ctx.shadowBlur = p.glowBlur;
      for (const pt of projected) {
        const c = getParticleColor(pt, p, rgb1, rgb2);
        ctx.fillStyle = c;
        ctx.shadowColor = c;
        ctx.globalAlpha = Math.max(0.15, Math.min(1, pt.alpha));
        ctx.beginPath();
        ctx.arc(pt.px, pt.py, pt.r * 0.5, 0, Math.PI * 2);
        ctx.fill();
      }

      // Draw mesh edges
      ctx.shadowBlur = 0;
      ctx.lineWidth = 0.5;
      for (let k = 0; k < edges.length; k += 2) {
        const i = edges[k], j = edges[k + 1];
        const a = projected[i], b = projected[j];
        const lineAlpha = Math.min(a.alpha, b.alpha) * 0.3;
        const midPt = { px: (a.px + b.px) / 2, py: (a.py + b.py) / 2, z: (a.z + b.z) / 2, phase: (a.phase + b.phase) / 2 };
        ctx.strokeStyle = getParticleColor(midPt, p, rgb1, rgb2);
        ctx.globalAlpha = lineAlpha;
        ctx.beginPath();
        ctx.moveTo(a.px, a.py);
        ctx.lineTo(b.px, b.py);
        ctx.stroke();
      }
    },

    _triangulate(pts, maxDist) {
      // Simple nearest-neighbor triangulation: connect each point to its 2 nearest neighbors within maxDist
      const edges = [];
      const maxPerPoint = 2;
      const totalEdges = Math.min(pts.length * maxPerPoint, 600);
      let count = 0;

      for (let i = 0; i < pts.length && count < totalEdges; i++) {
        const a = pts[i];
        const dists = [];
        for (let j = 0; j < pts.length; j++) {
          if (j === i) continue;
          const b = pts[j];
          const dx = a.px - b.px, dy = a.py - b.py;
          const d = Math.sqrt(dx * dx + dy * dy);
          if (d <= maxDist) dists.push({ j, d });
        }
        dists.sort((a, b) => a.d - b.d);
        for (let k = 0; k < Math.min(maxPerPoint, dists.length) && count < totalEdges; k++) {
          edges.push(i, dists[k].j);
          count++;
        }
      }
      return edges;
    }
  },

  glow: {
    name: 'Glow Field',
    _cache: null,
    draw(ctx, projected, p) {
      // Pre-render gradient canvases at different sizes
      if (!this._cache) {
        this._cache = {};
        const sizes = [2, 4, 8, 16, 32];
        for (const size of sizes) {
          const c = document.createElement('canvas');
          c.width = size * 2;
          c.height = size * 2;
          const t = c.getContext('2d');
          const grad = t.createRadialGradient(size, size, 0, size, size, size);
          grad.addColorStop(0, 'rgba(255,255,255,1)');
          grad.addColorStop(0.1, 'rgba(255,255,255,0.8)');
          grad.addColorStop(0.4, 'rgba(255,255,255,0.3)');
          grad.addColorStop(1, 'rgba(255,255,255,0)');
          t.fillStyle = grad;
          t.fillRect(0, 0, size * 2, size * 2);
          this._cache[size] = c;
        }
      }

      const rgb1 = hexToRgb(p.color);
      const rgb2 = p.colorSecondary && p.colorMode !== 'solid' ? hexToRgb(p.colorSecondary) : null;
      ctx.shadowBlur = 0;
      ctx.globalCompositeOperation = 'lighter';

      for (const pt of projected) {
        const size = Math.round(pt.r * 2);
        if (size < 1) continue;
        const snap = size <= 4 ? 4 : size <= 8 ? 8 : size <= 16 ? 16 : 32;
        const tex = this._cache[snap];
        if (!tex) continue;
        const c = getParticleColor(pt, p, rgb1, rgb2);
        // Draw a small colored dot, then additive blend the glow texture
        ctx.fillStyle = c;
        ctx.globalAlpha = Math.max(0.05, Math.min(0.4, pt.alpha));
        ctx.beginPath();
        ctx.arc(pt.px, pt.py, pt.r * 0.3, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = Math.max(0.05, Math.min(0.4, pt.alpha));
        ctx.drawImage(tex, pt.px - snap, pt.py - snap, snap * 2, snap * 2);
      }

      ctx.globalCompositeOperation = 'source-over';
      ctx.globalAlpha = 1;
    }
  }
};

function initStars() {
  const list = [];
  for (let layer = 0; layer < 2; layer++) {
    const count = 156 + layer * 78;
    const depth = 0.3 + layer * 0.4;
    for (let i = 0; i < count; i++) {
      list.push({
        x: Math.random() * W,
        y: Math.random() * H,
        r: 0.3 + Math.random() * (1.2 - layer * 0.4),
        a: 0.15 + Math.random() * (0.55 - layer * 0.15),
        depth: depth
      });
    }
  }
  stars = list;
}

function drawStars() {
  ctx.fillStyle = '#ffffff';
  for (const s of stars) {
    const ox = yawAngle * 80 * s.depth;
    const oy = pitchAngle * 60 * s.depth;
    const sx = (s.x + ox + W) % W;
    const sy = (s.y + oy + H) % H;
    ctx.globalAlpha = s.a;
    ctx.beginPath();
    ctx.arc(sx, sy, s.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function frame(t) {
  try {
    const p = params;
    // Clear or trail
    if (p.trails) {
      ctx.fillStyle = 'rgba(6,6,14,0.15)';
      ctx.fillRect(0, 0, W, H);
    } else {
      ctx.clearRect(0, 0, W, H);
    }
    // Starfield background
    if (p.starfield && stars.length) drawStars();
    if (!particles.length || !logoCanvas) {
      animId = requestAnimationFrame(frame);
      return;
    }

    const time = t * 0.00015;

    // Keyboard-driven rotation with smooth interpolation
    const ROT_SPEED = 0.025;
    const targetYawSpeed = (keys['ArrowLeft'] ? -1 : keys['ArrowRight'] ? 1 : 0) * ROT_SPEED;
    const targetPitchSpeed = (keys['ArrowUp'] ? -1 : keys['ArrowDown'] ? 1 : 0) * ROT_SPEED;
    let yawSpd = 0, pitchSpd = 0;
    yawSpd += (targetYawSpeed - yawSpd) * 0.15;
    pitchSpd += (targetPitchSpeed - pitchSpd) * 0.15;
    yawAngle += yawSpd;
    pitchAngle += pitchSpd;

    // Auto-yaw oscillation (togglable with /)
    const autoYaw = yRotEnabled ? Math.sin(t * 0.0003) * p.yawAmp * 1.75 : 0;
    const effectiveYaw = yawAngle + autoYaw;
    const yaw = effectiveYaw;
    const pitch = pitchAngle + Math.sin(time * p.pitchSpeed * 0.7) * p.pitchAmp * 0.5;

    // Logo bounds
    const logoAspect = logoCanvas.width / logoCanvas.height;
    const sc = p.scale * Math.min(W, H / logoAspect);
    let lw, lh, lx, ly;
    if (W / H > logoAspect) {
      lh = sc;
      lw = sc * logoAspect;
      lx = (W - lw) / 2;
      ly = (H - lh) / 2;
    } else {
      lw = sc;
      lh = sc / logoAspect;
      lx = (W - lw) / 2;
      ly = (H - lh) / 2;
    }

    const sx = lw / logoCanvas.width;
    const sy = lh / logoCanvas.height;
    const cx = lx + lw / 2;
    const cy = ly + lh / 2;

    ctx.shadowColor = p.color;
    ctx.shadowBlur = p.glowBlur;

    // Compute & project
    const projected = [];
    const lcx = logoCanvas.width / 2, lcy = logoCanvas.height / 2;
    const waveOrigin = getWaveOrigin(t);
    for (const pt of particles) {
      const waveX = p.waveAmp * Math.sin(t * p.waveFreq + pt.phase + pt.ty * 0.01);
      const waveY = p.waveAmp * 0.6 * Math.cos(t * p.waveFreq * 1.2 + pt.phase * 0.7 + pt.tx * 0.008);
      const waveZ = p.waveAmp * 1.5 * Math.sin(t * p.waveFreq * 0.9 + pt.phase * 1.1 + pt.ty * 0.006);

      // Wave modulation from origin
      const wdx = pt.tx - waveOrigin.x, wdy = pt.ty - waveOrigin.y;
      const waveMod = 0.6 + 0.4 * Math.max(0, Math.cos(Math.sqrt(wdx * wdx + wdy * wdy) * 0.02 - t * 0.002));

      const targetX = pt.tx + waveX;
      const targetY = pt.ty + waveY;
      // Edge-distance depth: interior bulges, edges stay flat
      const depthSign = Math.sin(t * 0.0003 + pt.tx * 0.01 + pt.ty * 0.01);
      const targetZ = depthSign * Math.min(35, (pt.edgeDist || 0) * 0.8) + waveZ;

      const ry = rotateY(targetX, targetZ, yaw);
      const r3d = rotateX(targetY, ry.z, pitch);
      const rtx = ry.x;
      const rty = r3d.y;
      const rtz = r3d.z;

      pt.vx = (pt.vx + (rtx - pt.x) * p.spring) * p.damping;
      pt.vy = (pt.vy + (rty - pt.y) * p.spring) * p.damping;
      pt.vz = (pt.vz + (rtz - pt.z) * p.spring) * p.damping;

      pt.x += pt.vx;
      pt.y += pt.vy;
      pt.z += pt.vz;

      const zOffset = pt.z + 200;
      const scale = FOCAL / (FOCAL + zOffset);
      const screenX = pt.x * scale + cx - lw / 2 * scale;
      const screenY = pt.y * scale + cy - lh / 2 * scale;
      const screenSize = Math.max(pt.size * scale * 1.5, 0.3);
      const depthFade = p.depthFade ? Math.min(1, (zOffset + 100) / 300) : 1;

      // Convergence fade-in: particles fade as they approach target
      const convergeDist = Math.sqrt((pt.x - pt.tx) ** 2 + (pt.y - pt.ty) ** 2 + (pt.z - pt.tz) ** 2);
      const convergeAlpha = Math.min(1, Math.max(0.02, 1 - convergeDist / 2000));

      // Size pulse: particles breathe
      const sizePulse = 1.4 + 0.4 * Math.sin(t * 0.002 + pt.phase);
      const finalAlpha = Math.max(0.15, Math.min(1, depthFade * convergeAlpha * waveMod));
      const finalSize = Math.max(screenSize * sizePulse, 0.3);

      projected.push({ px: screenX, py: screenY, r: finalSize, z: zOffset, alpha: finalAlpha, phase: pt.phase });
    }

    projected.sort((a, b) => a.z - b.z);

    // Dispatch to current render mode
    const mode = RENDER_MODES[p.renderMode] || RENDER_MODES.dots;
    mode.draw(ctx, projected, p, t);

    // Edge shimmer: sparkle along the logo outline
    if (p.edgeShimmer && edgeParticles.length) {
      ctx.shadowBlur = 0;
      // Update sparkles
      for (const ep of edgeParticles) {
        if (ep.sparkle <= 0) {
          if (Math.random() < 0.24) ep.sparkle = 0.5 + Math.random() * 0.5;
        } else {
          ep.sparkle -= 0.04;
          if (ep.sparkle < 0) ep.sparkle = 0;
        }
      }
      // Project and draw edge particles
      const ss = Math.min(W, H) / 700;
      for (const ep of edgeParticles) {
        const ry = rotateY(ep.tx - lcx, ep.tz, yaw);
        const r3d = rotateX(ep.ty - lcy, ry.z, pitch);
        const zOff = r3d.z + 200;
        const ps = FOCAL / (FOCAL + zOff);
        const sx = r3d.x * ps * sc + cx;
        const sy = r3d.y * ps * sc + cy;
        if (sx < -50 || sx > W + 50 || sy < -50 || sy > H + 50) continue;
        // Faint white dot always visible
        ctx.globalAlpha = 0.23;
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(sx, sy, 3 * ss, 0, Math.PI * 2);
        ctx.fill();
        // Sparkle: bright core + glow
        if (ep.sparkle > 0.02) {
          const size = ep.sparkle * 2.8 * ss;
          ctx.globalAlpha = ep.sparkle * 0.35;
          ctx.fillStyle = p.color;
          ctx.beginPath();
          ctx.arc(sx, sy, size * 4, 0, Math.PI * 2);
          ctx.fill();
          ctx.globalAlpha = ep.sparkle * 0.9;
          ctx.fillStyle = '#ffffff';
          ctx.beginPath();
          ctx.arc(sx, sy, size, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }

    // Preset transition: crossfade old particles
    if (transition) {
      const elapsed = t - transition.startTime;
      const progress = Math.min(1, elapsed / transition.duration);
      if (progress < 1 && transition.oldParticles.length) {
        const fadeAlpha = 1 - progress;
        const oldP = p;
        // Render old particles with fading alpha
        const oldProjected = [];
        for (const pt of transition.oldParticles) {
          const waveX = oldP.waveAmp * Math.sin(t * oldP.waveFreq + pt.phase + pt.ty * 0.01);
          const waveY = oldP.waveAmp * 0.6 * Math.cos(t * oldP.waveFreq * 1.2 + pt.phase * 0.7 + pt.tx * 0.008);
          const waveZ = oldP.waveAmp * 1.5 * Math.sin(t * oldP.waveFreq * 0.9 + pt.phase * 1.1 + pt.ty * 0.006);
          const targetX = pt.tx + waveX, targetY = pt.ty + waveY;
          const targetZ = pt.tz + waveZ;
          const ry = rotateY(targetX, targetZ, yaw);
          const r3d = rotateX(targetY, ry.z, pitch);
          pt.vx = (pt.vx + (ry.x - pt.x) * oldP.spring) * oldP.damping;
          pt.vy = (pt.vy + (r3d.y - pt.y) * oldP.spring) * oldP.damping;
          pt.vz = (pt.vz + (r3d.z - pt.z) * oldP.spring) * oldP.damping;
          pt.x += pt.vx; pt.y += pt.vy; pt.z += pt.vz;
          const zOff = pt.z + 200;
          const sc2 = FOCAL / (FOCAL + zOff);
          oldProjected.push({
            px: pt.x * sc2 + cx - lw / 2 * sc2,
            py: pt.y * sc2 + cy - lh / 2 * sc2,
            r: Math.max(pt.size * sc2 * 1.5, 0.3),
            z: zOff,
            alpha: Math.max(0.15, Math.min(1, oldP.depthFade ? Math.min(1, (zOff + 100) / 300) : 1)) * fadeAlpha
          });
        }
        oldProjected.sort((a, b) => a.z - b.z);
        const oldMode = RENDER_MODES[oldP.renderMode] || RENDER_MODES.dots;
        oldMode.draw(ctx, oldProjected, oldP, t);
      }
      if (progress >= 1) transition = null;
    }

    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;
  } catch (e) {
    console.error('Mote frame error:', e);
  }
  animId = requestAnimationFrame(frame);
}

async function loadSVG(svgString, keepParticles) {
  currentSVG = svgString;
  const sampleSize = 1000;
  const result = await MoteSVG.renderToCanvas(svgString, sampleSize);
  if (!result) { console.error('SVG render failed'); return; }
  logoCanvas = result.canvas;
  particles = MoteSVG.sample(result, params.spacing, params);
  // Compute edge distance for each particle
  computeEdgeDist(svgString);
  engineReady = true;

  // Update SVG info
  const infoEl = document.getElementById('svg-info');
  if (infoEl) infoEl.textContent = MoteSVG.getInfo(svgString) + ` · ${particles.length} particles`;
}

function computeEdgeDist(svgString) {
  // Parse SVG paths and find edge particles
  const parser = new DOMParser();
  const doc = parser.parseFromString(svgString, 'image/svg+xml');
  const svg = doc.querySelector('svg');
  let svgW = 400, svgH = 300;
  const vb = svg ? svg.getAttribute('viewBox') : null;
  if (vb) { const pts = vb.split(/[,\s]+/).map(Number); svgW = pts[2] - pts[0]; svgH = pts[3] - pts[1]; }
  else { svgW = parseInt(svg.getAttribute('width')) || 400; svgH = parseInt(svg.getAttribute('height')) || 300; }

  // Collect all paths and circles for isPointInPath
  const paths = Array.from(doc.querySelectorAll('path')).map(p => p.getAttribute('d')).filter(Boolean).map(d => new Path2D(d));
  const circles = Array.from(doc.querySelectorAll('circle')).map(c => ({
    cx: parseFloat(c.getAttribute('cx')) || 0,
    cy: parseFloat(c.getAttribute('cy')) || 0,
    r: parseFloat(c.getAttribute('r')) || 0
  }));

  const inside = (x, y) => {
    for (const c of circles) { const dx = x - c.cx, dy = y - c.cy; if (dx * dx + dy * dy <= c.r * c.r) return true; }
    for (const p of paths) { if (ctx.isPointInPath(p, x, y, 'evenodd')) return true; }
    return false;
  };

  // Use a temporary offscreen canvas for isPointInPath
  const tmpCanvas = document.createElement('canvas');
  const tmpCtx = tmpCanvas.getContext('2d');
  const ctx = tmpCtx; // for the inside() closure

  // Sample edge grid
  const edgeSpacing = 7;
  const edgeList = [];
  const ec = Math.ceil(svgW / edgeSpacing);
  const er = Math.ceil(svgH / edgeSpacing);
  for (let gy = 1; gy < er - 1; gy++) {
    for (let gx = 1; gx < ec - 1; gx++) {
      const px = gx * edgeSpacing, py = gy * edgeSpacing;
      if (inside(px, py)) {
        if (!inside(px - edgeSpacing, py) || !inside(px + edgeSpacing, py) ||
            !inside(px, py - edgeSpacing) || !inside(px, py + edgeSpacing)) {
          edgeList.push({ tx: px, ty: py });
        }
      }
    }
  }

  // Store edge particles globally (for shimmer) and compute edge distance for each particle
  const logoW = logoCanvas.width, logoH = logoCanvas.height;
  const sx = logoW / svgW, sy = logoH / svgH;
  edgeParticles = edgeList.map(ep => ({
    tx: ep.tx, ty: ep.ty, tz: 0, sparkle: 0, phase: Math.random() * Math.PI * 2
  }));
  for (const pt of particles) {
    let minDist = Infinity;
    const px = pt.tx / sx, py = pt.ty / sy; // convert to SVG space
    for (const ep of edgeList) {
      const dx = px - ep.tx, dy = py - ep.ty;
      const d = dx * dx + dy * dy;
      if (d < minDist) minDist = d;
    }
    pt.edgeDist = Math.sqrt(minDist);
  }

  // Extract wave nodes from SVG circles
  waveNodes = circles.map(c => ({ x: c.cx, y: c.cy }));
}

function getWaveOrigin(t) {
  if (!waveNodes.length) return { x: 0, y: 0 };
  const cycle = (t * 0.00008) % waveNodes.length;
  const idx = Math.floor(cycle);
  const frac = cycle - idx;
  const a = waveNodes[idx];
  const b = waveNodes[(idx + 1) % waveNodes.length];
  return { x: a.x + (b.x - a.x) * frac, y: a.y + (b.y - a.y) * frac };
}

function resetParticles() {
  if (!logoCanvas) return;
  particles = MoteSVG.sample({ canvas: logoCanvas, width: logoCanvas.width, height: logoCanvas.height }, params.spacing, params);
  computeEdgeDist(currentSVG);
}

function applyParams(newParams) {
  Object.assign(params, newParams);
  updateUI();
}

function getPreset() {
  return {
    name: presetName,
    version: 1,
    svg: currentSVG,
    params: { ...params }
  };
}

function loadPreset(preset) {
  // Save current state for transition
  if (engineReady && particles.length > 0) {
    transition = {
      startTime: performance.now(),
      duration: params.transitionDuration || 800,
      oldParticles: particles.map(pt => ({ ...pt })),
      oldEdgeParticles: edgeParticles.map(ep => ({ ...ep }))
    };
  }
  presetName = preset.name || 'unnamed';
  applyParams(preset.params || DEFAULT_PARAMS);
  loadSVG(preset.svg || ICKNA_SVG);
  if (isPlayMode) {
    document.getElementById('player-preset-name').textContent = presetName;
  }
}

const paramBindings = [
  { id: 'yawSpeed', el: 'p-yawSpeed', val: 'v-yawSpeed', min: 0, max: 2, step: 0.01 },
  { id: 'pitchSpeed', el: 'p-pitchSpeed', val: 'v-pitchSpeed', min: 0, max: 1, step: 0.01 },
  { id: 'yawAmp', el: 'p-yawAmp', val: 'v-yawAmp', min: 0, max: 1, step: 0.01 },
  { id: 'pitchAmp', el: 'p-pitchAmp', val: 'v-pitchAmp', min: 0, max: 0.5, step: 0.01 },
  { id: 'spacing', el: 'p-spacing', val: 'v-spacing', min: 4, max: 60, step: 1 },
  { id: 'spring', el: 'p-spring', val: 'v-spring', min: 0.01, max: 0.2, step: 0.005 },
  { id: 'damping', el: 'p-damping', val: 'v-damping', min: 0.5, max: 0.98, step: 0.01 },
  { id: 'waveAmp', el: 'p-waveAmp', val: 'v-waveAmp', min: 0, max: 40, step: 1 },
  { id: 'waveFreq', el: 'p-waveFreq', val: 'v-waveFreq', min: 0, max: 0.01, step: 0.0001 },
  { id: 'zDispersion', el: 'p-zDispersion', val: 'v-zDispersion', min: 0, max: 200, step: 1 },
  { id: 'sizeMin', el: 'p-sizeMin', val: 'v-sizeMin', min: 0.5, max: 8, step: 0.5 },
  { id: 'sizeMax', el: 'p-sizeMax', val: 'v-sizeMax', min: 1, max: 16, step: 0.5 },
  { id: 'glowBlur', el: 'p-glowBlur', val: 'v-glowBlur', min: 0, max: 20, step: 1 },
  { id: 'depthFade', el: 'p-depthFade', val: 'v-depthFade', min: 0, max: 1, step: 0.05 },
  { id: 'scale', el: 'p-scale', val: 'v-scale', min: 0.1, max: 1.5, step: 0.05 },
  { id: 'lineThreshold', el: 'p-lineThreshold', val: 'v-lineThreshold', min: 20, max: 200, step: 2 },
  { id: 'transitionDuration', el: 'p-transitionDuration', val: 'v-transitionDuration', min: 0, max: 3000, step: 100 }
];

function initUI() {
  if (isPlayMode) return;

  document.body.classList.remove('mode-play');

  // Init sliders
  for (const b of paramBindings) {
    const input = document.getElementById(b.el);
    const display = document.getElementById(b.val);
    if (!input) continue;
    input.min = b.min;
    input.max = b.max;
    input.step = b.step;
    input.value = params[b.id];
    display.textContent = formatVal(params[b.id], b.step);
    input.addEventListener('input', () => {
      const val = parseFloat(input.value);
      params[b.id] = val;
      display.textContent = formatVal(val, b.step);
      if (b.id === 'spacing') resetParticles();
    });
  }

  // Color picker
  const colorInput = document.getElementById('p-color');
  const colorVal = document.getElementById('v-color');
  if (colorInput) {
    colorInput.value = params.color;
    colorVal.textContent = params.color;
    colorInput.addEventListener('input', () => {
      params.color = colorInput.value;
      colorVal.textContent = colorInput.value;
    });
  }

  // Render mode select
  const modeSelect = document.getElementById('p-renderMode');
  if (modeSelect) {
    modeSelect.value = params.renderMode;
    updateLineThresholdVisibility(params.renderMode);
    modeSelect.addEventListener('change', () => {
      params.renderMode = modeSelect.value;
      updateLineThresholdVisibility(params.renderMode);
    });
  }

  // Trails checkbox
  const trailsCheck = document.getElementById('p-trails');
  const trailsLabel = document.getElementById('v-trails');
  if (trailsCheck) {
    trailsCheck.checked = params.trails;
    trailsLabel.textContent = params.trails ? 'On' : 'Off';
    trailsCheck.addEventListener('change', () => {
      params.trails = trailsCheck.checked;
      trailsLabel.textContent = trailsCheck.checked ? 'On' : 'Off';
    });
  }

  // Edge shimmer checkbox
  const edgeShimmerCheck = document.getElementById('p-edgeShimmer');
  const edgeShimmerLabel = document.getElementById('v-edgeShimmer');
  if (edgeShimmerCheck) {
    edgeShimmerCheck.checked = params.edgeShimmer;
    edgeShimmerLabel.textContent = params.edgeShimmer ? 'On' : 'Off';
    edgeShimmerCheck.addEventListener('change', () => {
      params.edgeShimmer = edgeShimmerCheck.checked;
      edgeShimmerLabel.textContent = edgeShimmerCheck.checked ? 'On' : 'Off';
    });
  }

  // Starfield checkbox
  const starfieldCheck = document.getElementById('p-starfield');
  const starfieldLabel = document.getElementById('v-starfield');
  if (starfieldCheck) {
    starfieldCheck.checked = params.starfield;
    starfieldLabel.textContent = params.starfield ? 'On' : 'Off';
    starfieldCheck.addEventListener('change', () => {
      params.starfield = starfieldCheck.checked;
      starfieldLabel.textContent = starfieldCheck.checked ? 'On' : 'Off';
      if (starfieldCheck.checked) initStars();
    });
  }

  // Color mode select
  const colorModeSelect = document.getElementById('p-colorMode');
  if (colorModeSelect) {
    colorModeSelect.value = params.colorMode;
    updateSecondaryColorVisibility(params.colorMode);
    colorModeSelect.addEventListener('change', () => {
      params.colorMode = colorModeSelect.value;
      updateSecondaryColorVisibility(params.colorMode);
    });
  }

  // Secondary color picker
  const color2Input = document.getElementById('p-colorSecondary');
  const color2Val = document.getElementById('v-colorSecondary');
  if (color2Input) {
    color2Input.value = params.colorSecondary;
    color2Val.textContent = params.colorSecondary;
    color2Input.addEventListener('input', () => {
      params.colorSecondary = color2Input.value;
      color2Val.textContent = color2Input.value;
    });
  }

  // Palette select
  const paletteSelect = document.getElementById('p-palette');
  if (paletteSelect) {
    paletteSelect.value = 'custom';
    paletteSelect.addEventListener('change', () => {
      const pal = PALETTES[paletteSelect.value];
      if (pal && pal.colors.length >= 2) {
        params.color = pal.colors[0];
        params.colorSecondary = pal.colors[1] || pal.colors[0];
        document.getElementById('p-color').value = params.color;
        document.getElementById('v-color').textContent = params.color;
        document.getElementById('p-colorSecondary').value = params.colorSecondary;
        document.getElementById('v-colorSecondary').textContent = params.colorSecondary;
        paletteSelect.value = 'custom'; // reset to custom after applying
      }
    });
  }

  // Tab switching
  document.querySelectorAll('.panel-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.panel-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.panel-tab-content').forEach(c => c.style.display = 'none');
      tab.classList.add('active');
      const content = document.querySelector(`.panel-tab-content[data-tab="${tab.dataset.tab}"]`);
      if (content) content.style.display = '';
    });
  });

  // SVG drop zone
  const dropZone = document.getElementById('drop-zone');
  const fileInput = document.getElementById('svg-file-input');
  if (dropZone && fileInput) {
    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file && file.name.endsWith('.svg')) handleSVGFile(file);
    });
    fileInput.addEventListener('change', () => {
      if (fileInput.files[0]) handleSVGFile(fileInput.files[0]);
    });
  }

  // Reset to ickna
  document.getElementById('btn-load-ickna')?.addEventListener('click', () => {
    loadSVG(ICKNA_SVG);
    document.getElementById('svg-filename').style.display = 'none';
    document.querySelector('.drop-zone p').style.display = '';
  });

  // Reset particles
  document.getElementById('btn-reset-particles')?.addEventListener('click', resetParticles);

  // Reset defaults
  document.getElementById('btn-reset-defaults')?.addEventListener('click', () => {
    applyParams(DEFAULT_PARAMS);
    resetParticles();
  });

  // Save preset
  document.getElementById('btn-save-preset')?.addEventListener('click', () => {
    const name = prompt('Preset name:', presetName);
    if (!name) return;
    presetName = name;
    const preset = getPreset();
    savePresetToLocal(preset);
    renderPresetList();
  });

  // Export preset
  document.getElementById('btn-export-preset')?.addEventListener('click', () => {
    const preset = getPreset();
    const blob = new Blob([JSON.stringify(preset, null, 2)], { type: 'application/json' });
    downloadBlob(blob, `${preset.name || 'mote-preset'}.json`);
  });

  // Import preset
  document.getElementById('btn-import-preset')?.addEventListener('click', () => {
    document.getElementById('preset-file-input').click();
  });
  document.getElementById('preset-file-input')?.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const preset = JSON.parse(reader.result);
        loadPreset(preset);
        renderPresetList();
      } catch (err) {
        alert('Invalid preset file');
      }
    };
    reader.readAsText(file);
  });

  // Export HTML
  document.getElementById('btn-export-html')?.addEventListener('click', exportPlaybackHTML);

  // Panel collapse
  const panel = document.getElementById('editor-panel');
  const toggle = document.getElementById('panel-toggle');
  toggle?.addEventListener('click', () => {
    panel.classList.toggle('collapsed');
    toggle.textContent = panel.classList.contains('collapsed') ? '▶' : '◀';
  });

  // Render preset list
  renderPresetList();
}

function formatVal(val, step) {
  if (step < 0.01) return val.toFixed(4);
  if (step < 0.1) return val.toFixed(2);
  if (step < 1) return val.toFixed(1);
  return Math.round(val).toString();
}

function updateSecondaryColorVisibility(mode) {
  const row = document.querySelector('.color-secondary-row');
  if (row) row.style.display = (mode !== 'solid') ? '' : 'none';
}

function updateLineThresholdVisibility(mode) {
  const row = document.querySelector('.line-threshold-row');
  if (row) row.style.display = (mode === 'lines' || mode === 'triangles') ? '' : 'none';
}

function updateUI() {
  for (const b of paramBindings) {
    const input = document.getElementById(b.el);
    const display = document.getElementById(b.val);
    if (input) { input.value = params[b.id]; display.textContent = formatVal(params[b.id], b.step); }
  }
  const colorInput = document.getElementById('p-color');
  const colorVal = document.getElementById('v-color');
  if (colorInput) { colorInput.value = params.color; colorVal.textContent = params.color; }
  const modeSelect = document.getElementById('p-renderMode');
  if (modeSelect) { modeSelect.value = params.renderMode; }
  const trailsCheck = document.getElementById('p-trails');
  const trailsLabel = document.getElementById('v-trails');
  if (trailsCheck) { trailsCheck.checked = params.trails; trailsLabel.textContent = params.trails ? 'On' : 'Off'; }
  const edgeShimmerCheck = document.getElementById('p-edgeShimmer');
  const edgeShimmerLabel = document.getElementById('v-edgeShimmer');
  if (edgeShimmerCheck) { edgeShimmerCheck.checked = params.edgeShimmer; edgeShimmerLabel.textContent = params.edgeShimmer ? 'On' : 'Off'; }
  const starfieldCheck = document.getElementById('p-starfield');
  const starfieldLabel = document.getElementById('v-starfield');
  if (starfieldCheck) { starfieldCheck.checked = params.starfield; starfieldLabel.textContent = params.starfield ? 'On' : 'Off'; }
  const colorModeSelect = document.getElementById('p-colorMode');
  if (colorModeSelect) { colorModeSelect.value = params.colorMode; }
  const color2Input = document.getElementById('p-colorSecondary');
  const color2Val = document.getElementById('v-colorSecondary');
  if (color2Input) { color2Input.value = params.colorSecondary; color2Val.textContent = params.colorSecondary; }
  updateSecondaryColorVisibility(params.colorMode);
  updateLineThresholdVisibility(params.renderMode);
}

function handleSVGFile(file) {
  const reader = new FileReader();
  reader.onload = () => {
    loadSVG(reader.result);
    const fnEl = document.getElementById('svg-filename');
    fnEl.textContent = file.name;
    fnEl.style.display = '';
    document.querySelector('.drop-zone p').style.display = 'none';
  };
  reader.readAsText(file);
}

// ── Local storage presets ─────────────────────────────────────
function savePresetToLocal(preset) {
  const presets = getLocalPresets();
  presets[preset.name] = preset;
  try {
    localStorage.setItem('mote-presets', JSON.stringify(presets));
  } catch(e) {}
}

function getLocalPresets() {
  try {
    return JSON.parse(localStorage.getItem('mote-presets') || '{}');
  } catch(e) { return {}; }
}

function deleteLocalPreset(name) {
  const presets = getLocalPresets();
  delete presets[name];
  try {
    localStorage.setItem('mote-presets', JSON.stringify(presets));
  } catch(e) {}
  renderPresetList();
}

function renderPresetList() {
  const list = document.getElementById('preset-list');
  if (!list) return;
  const presets = getLocalPresets();
  list.innerHTML = '';
  const names = Object.keys(presets);
  if (!names.length) {
    list.innerHTML = '<div style="opacity:.3;font-size:11px;padding:8px 0">No saved presets</div>';
    return;
  }
  for (const name of names) {
    const item = document.createElement('div');
    item.className = 'preset-item' + (name === presetName ? ' active' : '');
    item.innerHTML = `
      <span class="name">${name}</span>
      <span class="actions">
        <button title="Load" data-load="${name}">▶</button>
        <button title="Delete" data-del="${name}">✕</button>
      </span>
    `;
    item.querySelector('[data-load]')?.addEventListener('click', (e) => {
      e.stopPropagation();
      loadPreset(presets[name]);
    });
    item.querySelector('[data-del]')?.addEventListener('click', (e) => {
      e.stopPropagation();
      if (confirm(`Delete preset "${name}"?`)) deleteLocalPreset(name);
    });
    list.appendChild(item);
  }
}

// ── Download helper ───────────────────────────────────────────
function downloadBlob(blob, filename) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(blob);
}

// ── Export playback HTML ──────────────────────────────────────
function exportPlaybackHTML() {
  const preset = getPreset();
  // Build a self-contained playback HTML
  const SCRIPT_CLOSE = '</scr' + 'ipt>';
  const html = `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Mote — ${preset.name}</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#06060e}
canvas{display:block;width:100%;height:100%}
</style>
</head>
<body>
<canvas id="c"></canvas>

async function init() {

function fallbackRender(svgStr, c, tctx, p) {
  const parser = new DOMParser();

  const vb = svg ? svg.getAttribute('viewBox') : null;
  if (vb) { const pts = vb.split(/[\\s,]+/).map(Number); svgW = pts[2] - pts[0]; svgH = pts[3] - pts[1]; }
  else { svgW = parseInt(svg.getAttribute('width')) || 400; svgH = parseInt(svg.getAttribute('height')) || 300; }

      py: pt.y * sc2 + cy - lh / 2 * sc2,

// ═══════════════════════════════════════════════════════════════
// Boot
// ═══════════════════════════════════════════════════════════════

async function boot() {
  if (isPlayMode) {
    document.body.classList.add('mode-play');
    document.getElementById('player-overlay').style.display = 'block';

    // Try to load preset
    if (presetParam && presetParam !== 'ickna') {
      try {
        const resp = await fetch(presetParam);
        const preset = await resp.json();
        loadPreset(preset);
      } catch (e) {
        console.warn('Failed to load preset, falling back to ickna');
        loadPreset({ name: 'ickna', version: 1, svg: ICKNA_SVG, params: DEFAULT_PARAMS });
      }
    } else {
      loadPreset({ name: 'ickna', version: 1, svg: ICKNA_SVG, params: DEFAULT_PARAMS });
    }
  } else {
    // Editor mode
    initUI();
    loadSVG(ICKNA_SVG);
  }

  // Start self-healing render loop
  function loop() {
    try { frame(performance.now()); }
    catch (e) { console.error('Mote loop error:', e); }
  }
  loop();

  // Init starfield
  initStars();
  window.addEventListener('resize', () => {
    if (params.starfield) initStars();
  });

  // Drag rotation
  function onPointerDown(e) {
    const p = e.touches ? e.touches[0] || e.changedTouches[0] : e;
    dragState.active = true;
    dragState.startX = p.clientX;
    dragState.startY = p.clientY;
    dragState.moved = false;
  }
  function onPointerMove(e) {
    if (!dragState.active) return;
    const p = e.touches ? e.touches[0] || e.changedTouches[0] : e;
    const dx = p.clientX - dragState.startX;
    const dy = p.clientY - dragState.startY;
    if (Math.abs(dx) > 3 || Math.abs(dy) > 3) dragState.moved = true;
    yawAngle += dx * DRAG_SENSITIVITY;
    pitchAngle += dy * DRAG_SENSITIVITY;
    dragState.startX = p.clientX;
    dragState.startY = p.clientY;
  }
  function onPointerUp(e) {
    if (dragState.active && !dragState.moved) {
      yRotEnabled = !yRotEnabled;
    }
    dragState.active = false;
  }
  window.addEventListener('mousedown', onPointerDown);
  window.addEventListener('mousemove', onPointerMove);
  window.addEventListener('mouseup', onPointerUp);
  window.addEventListener('touchstart', onPointerDown, { passive: true });
  window.addEventListener('touchmove', onPointerMove, { passive: true });
  window.addEventListener('touchend', onPointerUp, { passive: true });

  // Keyboard controls
  document.addEventListener('keydown', e => { keys[e.key] = true; if (e.key === '/') yRotEnabled = !yRotEnabled; });
  document.addEventListener('keyup', e => { keys[e.key] = false; });

  // Hide loading
  setTimeout(() => document.getElementById('loading').classList.add('hidden'), 500);
}

boot();
