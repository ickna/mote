<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Mote</title>
<style>
/* ── Reset ──────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#06060e;--fg:#c8c8d0;--accent:#e03030;--panel:rgba(12,12,24,.92);--border:rgba(200,200,208,.12)}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--fg);font-family:'Inter',system-ui,-apple-system,sans-serif;font-size:13px}
canvas{display:block;width:100%;height:100%}

/* ── Loading ────────────────────────────────────── */
#loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:100;background:var(--bg);transition:opacity .6s ease;pointer-events:none}
#loading.hidden{opacity:0}
#loading .dot{width:6px;height:6px;margin:0 4px;border-radius:50%;background:var(--accent);animation:loadPulse 1.2s ease-in-out infinite}
#loading .dot:nth-child(2){animation-delay:.2s}
#loading .dot:nth-child(3){animation-delay:.4s}
@keyframes loadPulse{0%,100%{opacity:.2;transform:scale(1)}50%{opacity:1;transform:scale(1.5)}}

/* ── Player overlay ─────────────────────────────── */
#player-overlay{position:fixed;inset:0;z-index:5;pointer-events:none;display:none}
#player-overlay .info{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);font-size:11px;opacity:.15;letter-spacing:1px;text-transform:uppercase;white-space:nowrap}
.mode-play #player-overlay{display:block}

/* ── Editor Panel ───────────────────────────────── */
#editor-panel{position:fixed;top:0;left:0;bottom:0;width:300px;z-index:50;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:transform .3s ease}
.mode-play #editor-panel{display:none}
#editor-panel.collapsed{transform:translateX(-280px)}
#editor-panel.collapsed .panel-toggle{right:-32px;left:auto;border-radius:0 4px 4px 0;border:1px solid var(--border);border-left:0}

.panel-header{padding:16px 16px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.panel-header h1{font-size:15px;font-weight:600;letter-spacing:.5px}
.panel-header h1 span{color:var(--accent)}
.panel-header .btn{background:none;border:1px solid var(--border);color:var(--fg);padding:4px 10px;border-radius:4px;cursor:pointer;font-size:11px;transition:all .2s}
.panel-header .btn:hover{border-color:var(--accent);color:#fff}

.panel-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.panel-tab{padding:10px 16px;cursor:pointer;font-size:11px;text-transform:uppercase;letter-spacing:.5px;opacity:.4;border-bottom:2px solid transparent;transition:all .2s;user-select:none}
.panel-tab:hover{opacity:.7}
.panel-tab.active{opacity:1;border-bottom-color:var(--accent)}

.panel-body{flex:1;overflow-y:auto;padding:12px 16px}
.panel-body::-webkit-scrollbar{width:4px}
.panel-body::-webkit-scrollbar-track{background:transparent}
.panel-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

.panel-section{margin-bottom:16px}
.panel-section h3{font-size:10px;text-transform:uppercase;letter-spacing:1px;opacity:.35;margin-bottom:8px}

.param-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.param-row label{flex:0 0 80px;font-size:11px;opacity:.6}
.param-row input[type="range"]{flex:1;height:3px;-webkit-appearance:none;appearance:none;background:var(--border);border-radius:2px;outline:none;cursor:pointer}
.param-row input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--accent);border:2px solid var(--bg);cursor:pointer}
.param-row .param-val{flex:0 0 36px;text-align:right;font-size:11px;font-variant-numeric:tabular-nums;opacity:.7}
.param-row input[type="color"]{width:32px;height:24px;border:1px solid var(--border);border-radius:3px;padding:0;cursor:pointer;background:none}

.btn-row{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.btn-sm{background:transparent;border:1px solid var(--border);color:var(--fg);padding:6px 14px;border-radius:4px;cursor:pointer;font-size:11px;transition:all .2s;font-family:inherit}
.btn-sm:hover{border-color:var(--accent);color:#fff}
.btn-sm.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-sm.primary:hover{opacity:.85}

/* ── File drop zone ─────────────────────────────── */
.drop-zone{border:2px dashed var(--border);border-radius:6px;padding:24px 16px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:12px}
.drop-zone:hover,.drop-zone.dragover{border-color:var(--accent);background:rgba(224,48,48,.05)}
.drop-zone svg{width:24px;height:24px;opacity:.3;margin-bottom:6px}
.drop-zone p{font-size:11px;opacity:.4}
.drop-zone .filename{font-size:12px;opacity:.7;margin-top:4px;display:none}

/* ── Preset list ────────────────────────────────── */
.preset-list{display:flex;flex-direction:column;gap:4px}
.preset-item{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border:1px solid var(--border);border-radius:4px;cursor:pointer;transition:all .2s}
.preset-item:hover{border-color:rgba(200,200,208,.3)}
.preset-item.active{border-color:var(--accent);background:rgba(224,48,48,.08)}
.preset-item .name{font-size:11px;font-weight:500}
.preset-item .actions{display:flex;gap:4px}
.preset-item .actions button{background:none;border:none;color:var(--fg);opacity:.3;cursor:pointer;font-size:13px;padding:2px 4px;transition:opacity .2s}
.preset-item .actions button:hover{opacity:1}

/* ── Panel toggle ───────────────────────────────── */
.panel-toggle{position:absolute;top:50%;right:-32px;transform:translateY(-50%);width:32px;height:40px;background:var(--panel);border:1px solid var(--border);border-left:0;border-radius:0 4px 4px 0;cursor:pointer;color:var(--fg);font-size:14px;display:flex;align-items:center;justify-content:center;opacity:.5;transition:opacity .2s}
#editor-panel.collapsed .panel-toggle{left:auto;right:-32px;border-radius:0 4px 4px 0;border:1px solid var(--border);border-left:0}
.panel-toggle:hover{opacity:1}

/* ── Color row override ─────────────────────────── */
.color-row .param-val{flex:0 0 auto;font-size:10px;font-family:monospace;opacity:.5}

/* ── Responsive ─────────────────────────────────── */
@media(max-width:720px){#editor-panel{width:260px}}

/* ── Playback hamburger menu ──────────────────────────── */
#pmenu{position:fixed;bottom:12px;left:12px;z-index:60;font-family:'Inter',system-ui,sans-serif}
.mode-play #pmenu{display:block}
#pmenu-btn{width:54px;height:54px;border:none;background:rgba(255,255,255,.06);color:rgba(255,255,255,.35);border-radius:12px;font-size:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s;backdrop-filter:blur(4px)}
#pmenu-btn:hover,#pmenu-btn:active{background:rgba(255,255,255,.12);color:rgba(255,255,255,.7)}
#pmenu-items{display:none;flex-direction:column;gap:6px;margin-top:6px;padding:12px;background:rgba(6,6,14,.85);border:1px solid rgba(255,255,255,.08);border-radius:14px;backdrop-filter:blur(8px);min-width:260px}
#pmenu-items.open{display:flex}
.pmenu-row{display:flex;align-items:center;gap:10px;padding:6px 8px;border-radius:8px;cursor:pointer;transition:all .2s}
.pmenu-row:hover{background:rgba(255,255,255,.04)}
.pmenu-label{color:rgba(255,255,255,.7);font-size:18px;font-weight:500;flex:1;cursor:pointer;user-select:none;padding:6px 0}
.pmenu-label:active{color:#fff}
.pmenu-toggle{position:relative;width:42px;height:24px;flex-shrink:0;cursor:pointer}
.pmenu-toggle input{opacity:0;width:0;height:0}
.pmenu-toggle span{position:absolute;inset:0;background:rgba(255,255,255,.12);border-radius:12px;transition:all .3s}
.pmenu-toggle span::before{content:'';position:absolute;width:18px;height:18px;left:3px;top:3px;background:rgba(255,255,255,.35);border-radius:50%;transition:all .3s}
.pmenu-toggle input:checked+span{background:rgba(224,48,48,.5)}
.pmenu-toggle input:checked+span::before{left:21px;background:#fff}
.rate-slider{width:80px;height:5px;flex-shrink:0;-webkit-appearance:none;appearance:none;background:rgba(255,255,255,.15);border-radius:3px;outline:none;cursor:pointer}
.rate-slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:rgba(255,255,255,.5);cursor:pointer}

/* ── Editor effect trigger buttons ────────────────────── */
.fx-row{display:flex;gap:6px;margin-top:8px}
.fx-btn{background:transparent;border:1px solid var(--border);color:var(--fg);padding:6px 12px;border-radius:4px;cursor:pointer;font-size:11px;transition:all .2s;font-family:inherit;flex:1;text-align:center}
.fx-btn:hover{border-color:var(--accent);color:#fff}
.fx-btn:active{background:rgba(224,48,48,.15)}

/* ── Disabled sliders for ickna profile ──────────────── */
.param-row.disabled{opacity:.3;pointer-events:none}
/* ── Animation tab ─────────────────────────────── */
.anim-kf-list{max-height:200px;overflow-y:auto;margin-bottom:4px}
/* ── WS indicator ──────────────────────────────── */
#ws-indicator{position:fixed;top:12px;right:12px;width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.1);z-index:70;transition:background .3s}
#ws-indicator.connected{background:#00ff88;box-shadow:0 0 6px rgba(0,255,136,.5)}
#ws-indicator.error{background:#ff4444}
</style>
</head>
<body>

<!-- ── Canvas ─────────────────────────────────── -->
<canvas id="c"></canvas>

<!-- ── Loading ─────────────────────────────────── -->
<div id="loading"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>

<!-- ── Player overlay ──────────────────────────── -->
<div id="player-overlay">
  <div class="info">Mote <span style="color:var(--accent)">◆</span> <span id="player-preset-name"></span></div>
</div>
<div id="ws-indicator"></div>

<!-- ── Playback hamburger menu ───────────────── -->
<div id="pmenu">
  <button id="pmenu-btn">☰</button>
  <div id="pmenu-items">
    <div class="pmenu-row" data-action="ice">
      <span class="pmenu-label">❄️ Ice</span>
      <label class="pmenu-toggle"><input type="checkbox"><span></span></label>
      <input type="range" class="rate-slider" min="1" max="30" value="15">
    </div>
    <div class="pmenu-row" data-action="fire">
      <span class="pmenu-label">🔥 Fire</span>
      <label class="pmenu-toggle"><input type="checkbox"><span></span></label>
      <input type="range" class="rate-slider" min="1" max="30" value="15">
    </div>
    <div class="pmenu-row" data-action="lightning">
      <span class="pmenu-label">⚡ Lightning</span>
      <label class="pmenu-toggle"><input type="checkbox"><span></span></label>
      <input type="range" class="rate-slider" min="1" max="30" value="15">
    </div>
  </div>
</div>

<!-- ── Editor Panel ────────────────────────────── -->
<div id="editor-panel">
  <div class="panel-header">
    <h1><span>M</span>ote</h1>
    <div>
      <button class="btn" id="btn-export-html" title="Export as playback HTML">Export HTML</button>
      <button class="btn" id="btn-toggle-collapse" title="Collapse panel">◀</button>
    </div>
  </div>

  <div class="panel-tabs">
    <div class="panel-tab active" data-tab="params">Parameters</div>
    <div class="panel-tab" data-tab="svg">SVG</div>
    <div class="panel-tab" data-tab="presets">Presets</div>
    <div class="panel-tab" data-tab="timeline">Timeline</div>
    <div class="panel-tab" data-tab="anim">Animation</div>
  </div>

  <div class="panel-body" id="panel-body">
    <!-- ── PARAMETERS TAB ── -->
    <div class="panel-tab-content" data-tab="params">
      <div class="panel-section">
        <h3>3D Rotation</h3>
        <div class="param-row"><label>Yaw Speed</label><input type="range" id="p-yawSpeed" min="0" max="2" step="0.01"><span class="param-val" id="v-yawSpeed"></span></div>
        <div class="param-row"><label>Pitch Speed</label><input type="range" id="p-pitchSpeed" min="0" max="1" step="0.01"><span class="param-val" id="v-pitchSpeed"></span></div>
        <div class="param-row"><label>Yaw Amp</label><input type="range" id="p-yawAmp" min="0" max="1" step="0.01"><span class="param-val" id="v-yawAmp"></span></div>
        <div class="param-row"><label>Pitch Amp</label><input type="range" id="p-pitchAmp" min="0" max="0.5" step="0.01"><span class="param-val" id="v-pitchAmp"></span></div>
      </div>

      <div class="panel-section">
        <h3>Particle Motion</h3>
        <div class="param-row"><label>Spacing</label><input type="range" id="p-spacing" min="4" max="60" step="1"><span class="param-val" id="v-spacing"></span></div>
        <div class="param-row"><label>Spring</label><input type="range" id="p-spring" min="0.01" max="0.2" step="0.005"><span class="param-val" id="v-spring"></span></div>
        <div class="param-row"><label>Damping</label><input type="range" id="p-damping" min="0.5" max="0.98" step="0.01"><span class="param-val" id="v-damping"></span></div>
        <div class="param-row"><label>Wave Amp</label><input type="range" id="p-waveAmp" min="0" max="40" step="1"><span class="param-val" id="v-waveAmp"></span></div>
        <div class="param-row"><label>Wave Freq</label><input type="range" id="p-waveFreq" min="0" max="0.01" step="0.0001"><span class="param-val" id="v-waveFreq"></span></div>
        <div class="param-row"><label>Z Dispersion</label><input type="range" id="p-zDispersion" min="0" max="200" step="1"><span class="param-val" id="v-zDispersion"></span></div>
      </div>

      <div class="panel-section">
        <h3>Appearance</h3>
        <div class="param-row"><label>Size Min</label><input type="range" id="p-sizeMin" min="0.5" max="8" step="0.5"><span class="param-val" id="v-sizeMin"></span></div>
        <div class="param-row"><label>Size Max</label><input type="range" id="p-sizeMax" min="1" max="16" step="0.5"><span class="param-val" id="v-sizeMax"></span></div>
        <div class="param-row"><label>Glow Blur</label><input type="range" id="p-glowBlur" min="0" max="20" step="1"><span class="param-val" id="v-glowBlur"></span></div>
        <div class="param-row"><label>DF Amount</label><input type="range" id="p-depthFade" min="0" max="1" step="0.05"><span class="param-val" id="v-depthFade"></span></div>
        <div class="param-row"><label>Color</label><input type="color" id="p-color"><span class="param-val" id="v-color"></span></div>
                <div class="param-row color-secondary-row" style="display:none"><label>Color 2</label><input type="color" id="p-colorSecondary"><span class="param-val" id="v-colorSecondary"></span></div>
                <div class="param-row"><label>Color Mode</label>
                  <select id="p-colorMode" style="flex:1;background:var(--bg);color:var(--fg);border:1px solid var(--border);border-radius:3px;padding:3px 6px;font-size:11px;font-family:inherit">
                    <option value="solid">Solid</option>
                    <option value="gradient-z">Z Gradient</option>
                    <option value="gradient-position">Position</option>
                    <option value="gradient-random">Random</option>
                  </select>
                </div>
                <div class="param-row"><label>Palette</label>
                  <select id="p-palette" style="flex:1;background:var(--bg);color:var(--fg);border:1px solid var(--border);border-radius:3px;padding:3px 6px;font-size:11px;font-family:inherit">
                    <option value="custom">Custom</option>
                    <option value="fire">Fire</option>
                    <option value="ocean">Ocean</option>
                    <option value="aurora">Aurora</option>
                    <option value="sunset">Sunset</option>
                    <option value="neon">Neon</option>
                    <option value="monochrome">Monochrome</option>
                  </select>
                </div>
                <div class="param-row"><label>Scale</label><input type="range" id="p-scale" min="0.1" max="1.5" step="0.05"><span class="param-val" id="v-scale"></span></div>
                <div class="param-row"><label>Render Mode</label>
                  <select id="p-renderMode" style="flex:1;background:var(--bg);color:var(--fg);border:1px solid var(--border);border-radius:3px;padding:3px 6px;font-size:11px;font-family:inherit">
                    <option value="ickna">ickna (full pipeline)</option>
                    <option value="dots">Dots</option>
                    <option value="lines">Connected Lines</option>
                    <option value="triangles">Triangles</option>
                    <option value="glow">Glow Field</option>
                  </select>
                </div>
                <div class="param-row"><label>Size Scale</label><input type="range" id="p-sizeScale" min="0.1" max="3" step="0.02"><span class="param-val" id="v-sizeScale"></span></div>
                <div class="param-row"><label>Glow Mode</label>
                  <select id="p-glowMode" style="flex:1;background:var(--bg);color:var(--fg);border:1px solid var(--border);border-radius:3px;padding:3px 6px;font-size:11px;font-family:inherit">
                    <option value="texture">Texture (fast)</option>
                    <option value="shadow">Shadow</option>
                    <option value="off">Off</option>
                  </select>
                </div>
                <div class="param-row"><label>Depth Fade</label>
                  <select id="p-depthFadeMode" style="flex:1;background:var(--bg);color:var(--fg);border:1px solid var(--border);border-radius:3px;padding:3px 6px;font-size:11px;font-family:inherit">
                    <option value="ickna">ickna</option>
                    <option value="linear">Linear</option>
                  </select>
                </div>
                <div class="param-row"><label>Motion</label>
                  <select id="p-motionMode" style="flex:1;background:var(--bg);color:var(--fg);border:1px solid var(--border);border-radius:3px;padding:3px 6px;font-size:11px;font-family:inherit">
                    <option value="lerp">Lerp (smooth)</option>
                    <option value="spring">Spring (bouncy)</option>
                  </select>
                </div>
                <div class="param-row"><label>Lerp Speed</label><input type="range" id="p-lerpSpeed" min="0.02" max="0.2" step="0.005"><span class="param-val" id="v-lerpSpeed"></span></div>
                <div class="param-row"><label>Wave Mode</label>
                  <select id="p-waveMode" style="flex:1;background:var(--bg);color:var(--fg);border:1px solid var(--border);border-radius:3px;padding:3px 6px;font-size:11px;font-family:inherit">
                    <option value="am">Amplitude-Modulated</option>
                    <option value="fixed">Fixed</option>
                  </select>
                </div>
                <div class="param-row"><label>Auto Pitch</label>
                  <label style="flex:1;display:flex;align-items:center;gap:6px;cursor:pointer">
                    <input type="checkbox" id="p-autoPitch" style="accent-color:var(--accent)">
                    <span style="font-size:11px;opacity:.5" id="v-autoPitch">Off</span>
                  </label>
                </div>
                <div class="param-row line-threshold-row" style="display:none"><label>Line Threshold</label><input type="range" id="p-lineThreshold" min="20" max="200" step="2"><span class="param-val" id="v-lineThreshold"></span></div>
                <div class="param-row"><label>Trail Alpha</label><input type="range" id="p-trailAlpha" min="0" max="0.5" step="0.01"><span class="param-val" id="v-trailAlpha"></span></div>
                <div class="param-row"><label>Starfield</label>
                  <label style="flex:1;display:flex;align-items:center;gap:6px;cursor:pointer">
                    <input type="checkbox" id="p-starfieldEnabled" style="accent-color:var(--accent)">
                    <span style="font-size:11px;opacity:.5" id="v-starfieldEnabled">On</span>
                  </label>
                </div>
                <div class="param-row"><label>Flame FX</label>
                  <label style="flex:1;display:flex;align-items:center;gap:6px;cursor:pointer">
                    <input type="checkbox" id="p-flameEnabled" style="accent-color:var(--accent)">
                    <span style="font-size:11px;opacity:.5" id="v-flameEnabled">Off</span>
                  </label>
                </div>
                <div class="param-row"><label>Edge Line α</label><input type="range" id="p-edgeLineAlpha" min="0" max="1" step="0.02"><span class="param-val" id="v-edgeLineAlpha"></span></div>
                <div class="param-row"><label>Lightning FX</label>
                  <label style="flex:1;display:flex;align-items:center;gap:6px;cursor:pointer">
                    <input type="checkbox" id="p-lightningEnabled" style="accent-color:var(--accent)">
                    <span style="font-size:11px;opacity:.5" id="v-lightningEnabled">Off</span>
                  </label>
                </div>
                <div class="fx-row">
                  <button class="fx-btn" id="btn-fx-ice">❄️ Ice</button>
                  <button class="fx-btn" id="btn-fx-fire">🔥 Fire</button>
                  <button class="fx-btn" id="btn-fx-lightning">⚡ Bolt</button>
                </div>
                <div class="param-row"><label>Transition</label><input type="range" id="p-transitionDuration" min="0" max="3000" step="100"><span class="param-val" id="v-transitionDuration"></span></div>
              </div>

              <div class="btn-row">
                <button class="btn-sm primary" id="btn-reset-particles">Reset Particles</button>
                <button class="btn-sm" id="btn-reset-defaults">Reset Defaults</button>
              </div>
            </div>

    <!-- ── SVG TAB ── -->
    <div class="panel-tab-content" data-tab="svg" style="display:none">
      <div class="panel-section">
        <h3>Import SVG</h3>
        <div class="drop-zone" id="drop-zone">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 4v16M4 12h16"/></svg>
          <p>Drop SVG file or click to browse</p>
          <div class="filename" id="svg-filename"></div>
        </div>
        <input type="file" id="svg-file-input" accept=".svg" style="display:none">
      </div>
      <div class="panel-section">
        <h3>Current Shape</h3>
        <div id="svg-info">No SVG loaded</div>
      </div>
      <div class="btn-row">
        <button class="btn-sm" id="btn-load-ickna">Reset to ickna logo</button>
      </div>
    </div>

    <!-- ── PRESETS TAB ── -->
    <div class="panel-tab-content" data-tab="presets" style="display:none">
      <div class="panel-section">
        <h3>Saved Presets</h3>
        <div class="preset-list" id="preset-list"></div>
      </div>
      <div class="btn-row">
        <button class="btn-sm primary" id="btn-save-preset">Save Current as Preset</button>
        <button class="btn-sm" id="btn-export-preset">Export Preset JSON</button>

function hexToRgb(hex) {
  return { r: parseInt(hex.slice(1, 3), 16), g: parseInt(hex.slice(3, 5), 16), b: parseInt(hex.slice(5, 7), 16) };
}

function lerpRgb(rgb1, rgb2, t) {
  const t2 = Math.max(0, Math.min(1, t));
  return `rgb(${Math.round(rgb1.r + (rgb2.r - rgb1.r) * t2)},${Math.round(rgb1.g + (rgb2.g - rgb1.g) * t2)},${Math.round(rgb1.b + (rgb2.b - rgb1.b) * t2)})`;
}

function getParticleColor(pt, p, rgb1, rgb2) {
  if (p.colorMode === 'solid' || !rgb2) return p.color;
  let t;
  switch (p.colorMode) {
    case 'gradient-z': t = (pt.z + 100) / 400; break;
    case 'gradient-position': t = ((pt.px + pt.py) / 800 + 0.5) % 1; break;
    case 'gradient-random': t = (pt.phase / (Math.PI * 2)); break;
    default: return p.color;
  }
  return lerpRgb(rgb1, rgb2, t);
}

// ═══════════════════════════════════════════════════════════════
// Animator — keyframe-based param animation
// ═══════════════════════════════════════════════════════════════

let animStartTime = 0;

function lerpColor(c1, c2, tVal) {
  const r1 = parseInt(c1.slice(1, 3), 16), g1 = parseInt(c1.slice(3, 5), 16), b1 = parseInt(c1.slice(5, 7), 16);
  const r2 = parseInt(c2.slice(1, 3), 16), g2 = parseInt(c2.slice(3, 5), 16), b2 = parseInt(c2.slice(5, 7), 16);
  const rt = Math.round(r1 + (r2 - r1) * tVal), gt = Math.round(g1 + (g2 - g1) * tVal), bt = Math.round(b1 + (b2 - b1) * tVal);
  return '#' + rt.toString(16).padStart(2, '0') + gt.toString(16).padStart(2, '0') + bt.toString(16).padStart(2, '0');
}

function applyEasing(t, easing) {
  switch (easing) {
    case 'ease-in': return t * t;
    case 'ease-out': return 1 - (1 - t) * (1 - t);
    case 'ease-in-out': return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
    default: return t;
  }
}

function animEvaluate(baseParams, animDef, elapsed) {
  if (!animDef || !Object.keys(animDef).length) return baseParams;
  const rp = { ...baseParams };
  for (const key in animDef) {
    const a = animDef[key];
    if (!a.keyframes || a.keyframes.length < 2) continue;
    const last = a.keyframes[a.keyframes.length - 1][0];
    let et = a.loop ? elapsed % last : Math.min(elapsed, last);
    let i = 0;
    while (i < a.keyframes.length - 1 && a.keyframes[i + 1][0] < et) i++;
    const t0 = a.keyframes[i][0], v0 = a.keyframes[i][1];
    const t1 = a.keyframes[i + 1][0], v1 = a.keyframes[i + 1][1];
    const raw = t1 > t0 ? Math.max(0, Math.min(1, (et - t0) / (t1 - t0))) : 0;
    const tVal = applyEasing(raw, a.easing || 'linear');
    if (typeof v0 === 'string' && v0[0] === '#') {
      rp[key] = lerpColor(v0, v1, tVal);
    } else {
      rp[key] = v0 + (v1 - v0) * tVal;
    }
  }
  return rp;
}
